services:
  # Backend FastAPI Service
  - type: web
    name: cric-pro-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./cricket_tournament.db
      - key: PYTHONPATH
        value: .
    # This is key: it tells Render to look in the backend subfolder
    rootDir: backend

  # Frontend Static Site
  - type: static
    name: cric-pro-frontend
    runtime: static
    # Point to the frontend directory
    publishDir: frontend
    # Simplified Routing for Clean URLs
    routes:
      - type: rewrite
        source: /teams
        destination: /teams.html
      - type: rewrite
        source: /players
        destination: /players.html
      - type: rewrite
        source: /matches
        destination: /matches.html
      - type: rewrite
        source: /admin
        destination: /admin.html
      - type: rewrite
        source: /live
        destination: /live.html
      - type: fallback
        destination: /index.html
