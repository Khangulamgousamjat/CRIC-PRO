<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC PRO | Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3); }
        .card-hover:hover { transform: scale(1.02); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Sidebar -->
    <aside class="glass fixed left-0 top-0 h-screen w-72 z-50 flex flex-col p-8 border-r border-white/5">
        <a href="index.html" class="text-3xl font-bold tracking-tight mb-12 px-4">CRIC <span class="text-blue-500">PRO</span></a>
        
        <nav class="flex-1 flex flex-col space-y-3">
            <a href="index.html" class="flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 hover:bg-white/5 text-gray-400 hover:text-white w-full">
                <span class="text-xl">🏠</span>
                <span class="font-semibold text-lg tracking-wide">Home</span>
            </a>
            <a href="teams.html" class="flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 bg-blue-600/10 text-blue-400 border border-blue-600/20 w-full">
                <span class="text-xl">🛡️</span>
                <span class="font-semibold text-lg tracking-wide">Teams</span>
            </a>
            <a href="players.html" class="flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 hover:bg-white/5 text-gray-400 hover:text-white w-full">
                <span class="text-xl">👤</span>
                <span class="font-semibold text-lg tracking-wide">Players</span>
            </a>
            <a href="matches.html" class="flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all duration-300 hover:bg-white/5 text-gray-400 hover:text-white w-full">
                <span class="text-xl">🏏</span>
                <span class="font-semibold text-lg tracking-wide">Matches</span>
            </a>
        </nav>

        <div class="mt-auto pt-8 border-t border-white/5">
            <a href="admin.html" class="flex items-center justify-center space-x-3 px-6 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 transition font-bold shadow-lg shadow-blue-600/20 w-full group">
                <span class="text-xl group-hover:scale-110 transition duration-300">⚡</span>
                <span class="tracking-tight uppercase text-sm">Admin Panel</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-72 p-12">
        <div class="flex flex-col md:flex-row justify-between items-start gap-12">
            <!-- Team List -->
            <div id="teams-list-container" class="w-full">
                <h1 class="text-4xl font-bold mb-8 italic bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-cyan-300 to-white drop-shadow-sm">Registered Teams</h1>
                <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Skeleton Loaders -->
                    <div class="animate-pulse glass p-6 rounded-2xl border-l-4 border-slate-700">
                        <div class="flex items-center space-x-4 mb-4">
                            <div class="h-12 w-12 bg-slate-700/50 rounded-full"></div>
                            <div class="h-4 bg-slate-700/50 rounded w-1/2"></div>
                        </div>
                        <div class="h-3 bg-slate-700/50 rounded w-1/4"></div>
                    </div>
                </div>
            </div>

            <!-- Add Team Form (Admin Only) -->
            <div id="admin-form-container" class="w-full md:w-1/3 glass p-8 rounded-3xl sticky top-24" style="display: none;">
                <h2 class="text-2xl font-bold mb-6">Register New Team</h2>
                <form id="add-team-form" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Team Name</label>
                        <input type="text" id="team-name" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Tournament ID (Default: 1)</label>
                        <input type="number" id="tournament-id" value="1" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <p class="text-xs text-red-400" id="form-error"></p>
                    <button type="submit" class="w-full btn-gradient py-3 rounded-xl font-bold hover:shadow-lg transition duration-300">Register Team</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import CONFIG from './config.js';

        const token = localStorage.getItem('token');
        const adminForm = document.getElementById('admin-form-container');
        const listContainer = document.getElementById('teams-list-container');

        if (token && token !== "null" && token !== "undefined") {
            adminForm.style.display = 'block';
            listContainer.classList.add('md:w-2/3');
            listContainer.classList.remove('w-full');
        } else {
            adminForm.style.display = 'none';
            listContainer.classList.add('w-full');
            listContainer.classList.remove('md:w-2/3');
        }

        async function fetchTeams() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/teams/`);
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'admin.html';
                    return;
                }
                const data = await response.json();
                
                const grid = document.getElementById('teams-grid');
                grid.innerHTML = data.map(team => `
                    <div class="glass p-6 rounded-2xl card-hover border-l-4 border-blue-500 relative group">
                        <div class="flex items-center space-x-4 mb-4">
                            <div class="h-12 w-12 bg-blue-500/20 rounded-full flex items-center justify-center text-xl">🛡️</div>
                            <h3 class="text-xl font-bold">${team.name}</h3>
                        </div>
                        <div class="flex justify-between items-center text-sm text-gray-400">
                            <span>ID: ${team.id}</span>
                            <div class="space-x-4">
                                <a href="players.html?team=${team.id}" class="text-blue-400 hover:underline">View Squad</a>
                                ${token ? `<button onclick="deleteTeam(${team.id})" class="text-red-400 hover:text-red-500 transition opacity-0 group-hover:opacity-100">Delete</button>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500">No teams registered yet.</p>';
            } catch (err) { console.error(err); }
        }

        window.deleteTeam = async (id) => {
            if (!confirm('Are you sure? This will remove the team.')) return;
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/teams/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'admin.html';
                    return;
                }
                if (res.ok) fetchTeams();
                else alert("Failed to delete. Check if team has active matches.");
            } catch (err) { console.error(err); }
        };

        document.getElementById('add-team-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('form-error');
            
            if (!token) {
                errorEl.innerText = "Error: Admin token missing. Please login first.";
                return;
            }

            const teamData = {
                name: document.getElementById('team-name').value,
                tournament_id: parseInt(document.getElementById('tournament-id').value)
            };

            try {
                // --- API CREATE TEAM ---
                const res = await fetch(`${CONFIG.API_BASE_URL}/teams/`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(teamData)
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'admin.html';
                    return;
                }

                if (res.ok) {
                    document.getElementById('add-team-form').reset();
                    fetchTeams();
                } else {
                    const err = await res.json();
                    errorEl.innerText = err.detail || "Failed to add team.";
                }
            } catch (err) { errorEl.innerText = "Connection error."; }
        });

        fetchTeams();
    </script>
</body>
</html>
