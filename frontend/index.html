<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC PRO | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050505; color: #ffffff; }
        .glass { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px) scale(1.01); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.2); }
        .hero-title { letter-spacing: -0.05em; line-height: 0.9; }
        .text-gradient { background: linear-gradient(to bottom right, #fff 30%, #555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tight">CRIC <span class="text-blue-500">PRO</span></div>
        <div class="space-x-8 hidden md:flex items-center">
            <a href="index.html" class="text-blue-400 font-semibold border-b-2 border-blue-500 pb-1">Home</a>
            <a href="teams.html" class="hover:text-blue-400 transition">Teams</a>
            <a href="players.html" class="hover:text-blue-400 transition">Players</a>
            <a href="matches.html" class="hover:text-blue-400 transition">Matches</a>
            <a href="admin.html" class="bg-blue-600 px-5 py-2 rounded-full hover:bg-blue-700 transition">Admin Panel</a>
        </div>
        <div class="md:hidden">
            <button id="menu-btn" class="text-2xl">☰</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="container mx-auto px-6 py-12">
        <div class="text-center mb-16 relative py-20">
            <h1 class="text-6xl md:text-8xl font-black mb-6 text-white hero-title tracking-tighter uppercase font-heading">Tournament Leaderboard</h1>
            <p class="text-zinc-500 text-sm md:text-base max-w-lg mx-auto font-bold tracking-[0.3em] uppercase">
                Official statistics from the frontline of excellence.
            </p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-16">
            <!-- Top Scorers Card -->
            <div class="glass p-8 rounded-3xl card-hover">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold">Top Scorers</h2>
                    <span class="text-blue-500 text-3xl">🏆</span>
                </div>
                <div id="scorers-list" class="space-y-4">
                    <!-- Skeleton Cards -->
                    <div class="animate-pulse flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <div class="flex items-center space-x-4">
                            <div class="rounded-full bg-slate-700/50 h-10 w-10"></div>
                            <div class="h-4 bg-slate-700/50 rounded w-24"></div>
                        </div>
                        <div class="h-6 bg-slate-700/50 rounded w-12"></div>
                    </div>
                </div>
            </div>

            <!-- Top Bowlers Card -->
            <div class="glass p-8 rounded-3xl card-hover">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold">Top Bowlers</h2>
                    <span class="text-purple-500 text-3xl">🧿</span>
                </div>
                <div id="bowlers-list" class="space-y-4">
                    <!-- Skeleton Cards -->
                    <div class="animate-pulse flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <div class="flex items-center space-x-4">
                            <div class="rounded-full bg-slate-700/50 h-10 w-10"></div>
                            <div class="h-4 bg-slate-700/50 rounded w-24"></div>
                        </div>
                        <div class="h-6 bg-slate-700/50 rounded w-12"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Featured Section -->
        <div class="text-center">
            <a href="matches.html" class="inline-block glass px-8 py-4 rounded-2xl hover:bg-white/10 transition group">
                <span class="text-lg font-semibold mr-2">Check All Live Matches</span>
                <span class="inline-block group-hover:translate-x-1 transition-transform">→</span>
            </a>
        </div>
    </main>

    <footer class="text-center py-12 text-gray-500 text-sm">
        &copy; 2026 CRIC PRO System. Built for excellence.
    </footer>

    <script type="module">
        import CONFIG from './config.js';

        async function fetchLeaderboard() {
            try {
                // --- API FETCH URL ---
                const response = await fetch(`${CONFIG.API_BASE_URL}/stats/leaderboard`);
                const data = await response.json();
                
                // Update Scorers
                const scorersList = document.getElementById('scorers-list');
                const topScorers = [...data].sort((a, b) => b.total_runs - a.total_runs).slice(0, 5);
                
                scorersList.innerHTML = topScorers.map((player, idx) => `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <div class="flex items-center space-x-4">
                            <span class="text-blue-500 font-bold">#${idx+1}</span>
                            <span class="font-semibold text-lg">${player.name}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-xl text-blue-400">${player.total_runs}</div>
                            <div class="text-xs text-gray-400">SR: ${player.strike_rate}</div>
                        </div>
                    </div>
                `).join('') || '<p class="text-center text-gray-500">No data available</p>';

                // Update Bowlers
                const bowlersList = document.getElementById('bowlers-list');
                const topBowlers = [...data].sort((a, b) => b.total_wickets - a.total_wickets).slice(0, 5);
                
                bowlersList.innerHTML = topBowlers.map((player, idx) => `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <div class="flex items-center space-x-4">
                            <span class="text-purple-500 font-bold">#${idx+1}</span>
                            <span class="font-semibold text-lg">${player.name}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-xl text-purple-400">${player.total_wickets}</div>
                            <div class="text-xs text-gray-400">Econ: ${player.economy}</div>
                        </div>
                    </div>
                `).join('') || '<p class="text-center text-gray-500">No data available</p>';

            } catch (error) {
                console.error('Error fetching leaderboard:', error);
            }
        }

        fetchLeaderboard();
    </script>
</body>
</html>
