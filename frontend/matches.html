<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC PRO | Matches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #080808; color: #ffffff; }
        .glass { background: rgba(13, 13, 13, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-match { position: relative; overflow: hidden; }
        .card-match::before { content: ''; position: absolute; top:0; left:0; width:4px; height:100%; background: #3b82f6; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tight">CRIC <span class="text-blue-500">PRO</span></div>
        <div class="space-x-8 hidden md:flex items-center">
            <a href="index.html" class="hover:text-blue-400 transition">Home</a>
            <a href="teams.html" class="hover:text-blue-400 transition">Teams</a>
            <a href="players.html" class="hover:text-blue-400 transition">Players</a>
            <a href="matches.html" class="text-blue-400 font-semibold border-b-2 border-blue-500 pb-1">Matches</a>
            <a href="admin.html" class="bg-blue-600 px-5 py-2 rounded-full hover:bg-blue-700 transition">Admin Panel</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-start gap-12">
            <!-- Matches List -->
            <div id="matches-list-container" class="w-full">
                <h1 class="text-4xl font-bold mb-8 italic bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-cyan-300 to-white drop-shadow-sm">Upcoming & Live Matches</h1>
                <div id="matches-list" class="space-y-6">
                    <p class="text-gray-400">Loading matches...</p>
                </div>
            </div>

            <!-- Create Match Form (Admin Only) -->
            <div id="admin-form-container" class="w-full md:w-1/3 glass p-8 rounded-3xl sticky top-24" style="display: none;">
                <h2 class="text-2xl font-bold mb-6">Schedule Match</h2>
                <form id="add-match-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Team 1</label>
                            <select id="team1-id" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Team 2</label>
                            <select id="team2-id" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Venue</label>
                        <input type="text" id="venue" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Date & Time</label>
                        <input type="datetime-local" id="match-date" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <p class="text-xs text-red-400" id="form-error"></p>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold hover:opacity-90 transition">Create Match</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import CONFIG from './config.js';

        const token = localStorage.getItem('token');
        const adminForm = document.getElementById('admin-form-container');
        const listContainer = document.getElementById('matches-list-container');

        if (token && token !== "null" && token !== "undefined") {
            adminForm.style.display = 'block';
            listContainer.classList.add('md:w-2/3');
            listContainer.classList.remove('w-full');
        } else {
            adminForm.style.display = 'none';
            listContainer.classList.add('w-full');
            listContainer.classList.remove('md:w-2/3');
        }

        async function init() {
            try {
                const teamResp = await fetch(`${CONFIG.API_BASE_URL}/teams/`);
                const teams = await teamResp.json();
                ['team1-id', 'team2-id'].forEach(id => {
                    const el = document.getElementById(id);
                    el.innerHTML = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('') || '<option value="">No Teams</option>';
                });

                // --- API GET MATCHES ---
                const matchResp = await fetch(`${CONFIG.API_BASE_URL}/matches/`);
                const matches = await matchResp.json();
                const list = document.getElementById('matches-list');
                list.innerHTML = matches.map(m => `
                    <div class="glass p-6 rounded-2xl border-l-4 ${m.status === 'live' ? 'border-red-500' : 'border-blue-500'} flex flex-col md:flex-row justify-between items-center bg-white/5">
                        <div class="flex-1 text-center md:text-left mb-4 md:mb-0">
                            <div class="text-sm text-blue-400 font-bold mb-1 tracking-widest uppercase">${m.status}</div>
                            <div class="text-2xl font-bold flex items-center justify-center md:justify-start space-x-4">
                                <span>${m.team1_name}</span>
                                <span class="text-gray-600">VS</span>
                                <span>${m.team2_name}</span>
                            </div>
                            <div class="text-gray-400 mt-2">ðŸ“ ${m.venue} | ðŸ“… ${new Date(m.match_date).toLocaleString()}</div>
                        </div>
                        <div class="flex space-x-4">
                            ${m.status === 'live' ? `<a href="live.html?match=${m.id}" class="bg-red-600/20 text-red-500 border border-red-500/30 px-6 py-2 rounded-xl hover:bg-red-600 transition hover:text-white font-bold">Watch Live</a>` : ''}
                            <a href="live.html?match=${m.id}" class="bg-blue-600 px-6 py-2 rounded-xl hover:bg-blue-700 transition font-bold">Score Panel</a>
                        </div>
                    </div>
                `).join('') || '<p class="text-gray-500">No matches scheduled.</p>';
            } catch (err) { console.error(err); }
        }

        document.getElementById('add-match-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('form-error');
            if (!token) { errorEl.innerText = "Error: Login first."; return; }

            const matchData = {
                team1_id: parseInt(document.getElementById('team1-id').value),
                team2_id: parseInt(document.getElementById('team2-id').value),
                venue: document.getElementById('venue').value,
                match_date: document.getElementById('match-date').value
            };

            try {
                // --- API CREATE MATCH ---
                const res = await fetch(`${CONFIG.API_BASE_URL}/matches/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(matchData)
                });
                if (res.ok) { document.getElementById('add-match-form').reset(); init(); }
                else { errorEl.innerText = "Failed to create match."; }
            } catch (err) { errorEl.innerText = "Connection error."; }
        });

        init();
    </script>
</body>
</html>
